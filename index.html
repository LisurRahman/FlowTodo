<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" href="Daily Goal Todo.png">
    <title>Daily Goal Todo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-start: #eef2f7;
            --bg-end: #d9e2ec;
            --card-bg: #ffffff;
            --text-primary: #1a2c3e;
            --text-secondary: #3e5a6f;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            --radius: 28px;
        }

        body.dark-mode {
            --bg-start: #1e3265;
            --bg-end: #111827;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --accent: #60a5fa;
        }

        body.dark-mode .task-text {
            color: #ffffff !important;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 750px;
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* header */
        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        #darkToggle {
            background: var(--border);
            border: none;
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            cursor: pointer;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
        }

        /* timer section */
        .timer-section {
            padding: 1rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }

        .timer-panel {
            background: rgba(59, 130, 246, 0.08);
            border-radius: 40px;
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .timer-display {
            font-family: monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            background: var(--card-bg);
            padding: 6px 20px;
            border-radius: 60px;
            letter-spacing: 2px;
        }

        .timer-controls {
            display: flex;
            gap: 12px;
        }

        .btn-timer {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-timer-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .timer-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* input area */
        .input-area {
            padding: 1.5rem 2rem 0.5rem 2rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #taskInput {
            flex: 1;
            padding: 12px 20px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-primary);
            border-radius: 60px;
            outline: none;
            font-size: 1rem;
        }

        #taskInput:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 12px 20px;
            border-radius: 60px;
            cursor: pointer;
        }

        /* stats & filters */
        .stats-filters {
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .stats {
            background: var(--border);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .filter-group {
            display: flex;
            gap: 6px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        /* task list */
        .task-list-container {
            padding: 1rem 2rem 2rem 2rem;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-check {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
        }

        .task-text {
            flex: 1;
            font-weight: 500;
            cursor: pointer;
        }

        .task-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 30px;
            color: var(--text-secondary);
        }

        .icon-btn:hover {
            background: var(--border);
        }

        .footer-actions {
            padding: 0.5rem 2rem 1.8rem 2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
        }

        .history-btn {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* modal for daily history */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-record {
            background: var(--border);
            border-radius: 20px;
            padding: 12px;
            border-left: 5px solid var(--accent);
        }

        .day-date {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .day-tasks {
            font-size: 0.85rem;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .task-chip {
            background: var(--card-bg);
            padding: 2px 10px;
            border-radius: 30px;
        }

        .empty-msg {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }

        button {
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .timer-display {
                font-size: 1.4rem;
            }

            .timer-panel {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">
            <h1>🏆 Daily Goal</h1>
            <button id="darkToggle" aria-label="Dark mode">🌙</button>
        </div>

        <!-- Timer section -->
        <div class="timer-section">
            <div class="timer-panel">
                <div class="timer-display" id="timerDisplay">24:00:00</div>
                <div class="timer-controls">
                    <button id="startTimerBtn" class="btn-timer">▶ Start Day (24h)</button>
                    <button id="resetTimerBtn" class="btn-timer btn-timer-outline">⟳ Reset Day</button>
                </div>
                <div class="timer-status" id="timerStatus">⏸ Timer not started</div>
            </div>
        </div>

        <!-- Add task -->
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Write a task for this day..." autocomplete="off">
                <button id="addBtn" class="btn-primary">➕ Add Task</button>
                <button id="cancelEditBtn" class="btn-secondary" style="display: none;">Cancel</button>
            </div>
        </div>

        <!-- Stats & filters -->
        <div class="stats-filters">
            <div class="stats" id="taskStats">📋 0 tasks · 0 pending</div>
            <div class="filter-group">
                <button data-filter="all" class="filter-btn active">All</button>
                <button data-filter="active" class="filter-btn">Active</button>
                <button data-filter="completed" class="filter-btn">Completed</button>
            </div>
        </div>

        <!-- Task list -->
        <div class="task-list-container">
            <ul class="task-list" id="taskList">
                <li class="empty-msg">✨ Click "Start Day" and add your tasks</li>
            </ul>
        </div>

        <!-- Footer -->
        <div class="footer-actions">
            <button id="historyBtn" class="clear-btn history-btn">📜 Daily History</button>
            <button id="clearCompletedBtn" class="clear-btn">🗑️ Clear completed</button>
            <button id="clearAllBtn" class="clear-btn">⚠️ Delete all tasks</button>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📆 Past Days (24h sessions)</h3>
                <button id="closeModalBtn" style="font-size:1.8rem; background:none; border:none;">&times;</button>
            </div>
            <ul id="historyList" class="history-list">
                <li class="empty-msg">No days recorded yet.</li>
            </ul>
            <div style="padding:1rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end;">
                <button id="clearHistoryBtn" class="clear-btn" style="border-color:var(--danger);">Clear all
                    history</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- GLOBAL STATE ----------
        let tasks = [];           // { id, text, completed }
        let currentFilter = "all";
        let editModeId = null;
        let nextId = 1;

        // Timer state
        let timerActive = false;      // whether timer is running
        let timeLeftSeconds = 24 * 3600;  // 24 hours in seconds
        let timerInterval = null;
        let currentDayStartTime = null;   // timestamp when day started

        // History: store completed 24h sessions (snapshots of tasks)
        let dayHistory = [];   // each: { startDateISO, endDateISO, tasks: [{text, completed}] }

        // DOM elements
        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const cancelEditBtn = document.getElementById("cancelEditBtn");
        const taskListEl = document.getElementById("taskList");
        const taskStatsSpan = document.getElementById("taskStats");
        const filterBtns = document.querySelectorAll(".filter-btn");
        const clearCompletedBtn = document.getElementById("clearCompletedBtn");
        const clearAllBtn = document.getElementById("clearAllBtn");
        const darkToggle = document.getElementById("darkToggle");
        const historyBtn = document.getElementById("historyBtn");
        const historyModal = document.getElementById("historyModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const historyListEl = document.getElementById("historyList");
        const clearHistoryBtn = document.getElementById("clearHistoryBtn");
        const timerDisplay = document.getElementById("timerDisplay");
        const startTimerBtn = document.getElementById("startTimerBtn");
        const resetTimerBtn = document.getElementById("resetTimerBtn");
        const timerStatusSpan = document.getElementById("timerStatus");

        // ---------- Helper functions ----------
        function formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerDisplay.innerText = formatTime(timeLeftSeconds);
            if (timeLeftSeconds <= 0 && timerActive) {
                // timer finished
                finishCurrentDay();
            }
        }

        // called when timer reaches zero
        function finishCurrentDay() {
            if (!timerActive) return;
            stopTimer();
            timerActive = false;
            timerStatusSpan.innerText = "✅ Day finished! Start a new day.";
            timerDisplay.innerText = "00:00:00";
            // save snapshot of CURRENT tasks to history
            if (tasks.length > 0) {
                saveDaySnapshot();
            }
            // optional: clear tasks? No, user might want to review. But typical: after a day ends, new day starts fresh?
            // According to user: "after this timer i can add next next task after this timer (it's a day)" – they might want to reset tasks for new day.
            // I'll provide an option: when day finishes, tasks remain but NEW timer start will ask to keep or reset? Better to auto reset tasks
            // but user expects new day = fresh slate? Let's ask: But I'll implement: when day finishes or user clicks "Reset Day", clear tasks.
            // We'll do: finishCurrentDay also clears tasks? To keep clean, I'll add alert and clear tasks automatically after saving snapshot.
            if (tasks.length > 0) {
                if (confirm("Day finished! Save today's tasks to history. Start a fresh day?")) {
                    tasks = [];
                    nextId = 1;
                    editModeId = null;
                    renderTasks();
                    saveTasksToLocal();
                }
            }
            // also reset timer variables
            timeLeftSeconds = 24 * 3600;
            updateTimerDisplay();
            saveTimerState();
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimer() {
            if (timerActive) {
                alert("Timer already running!");
                return;
            }
            if (timeLeftSeconds <= 0) {
                // reset to 24h before starting
                timeLeftSeconds = 24 * 3600;
            }
            timerActive = true;
            currentDayStartTime = Date.now();
            timerStatusSpan.innerText = "⏳ Day in progress...";
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timerActive && timeLeftSeconds > 0) {
                    timeLeftSeconds--;
                    updateTimerDisplay();
                    saveTimerState();
                    if (timeLeftSeconds === 0) {
                        finishCurrentDay();
                    }
                }
            }, 1000);
            saveTimerState();
            updateTimerDisplay();
        }

        function resetDay() {
            if (timerActive) {
                if (confirm("Stop current day and reset timer? Current tasks will be cleared.")) {
                    stopTimer();
                    timerActive = false;
                    timeLeftSeconds = 24 * 3600;
                    updateTimerDisplay();
                    timerStatusSpan.innerText = "⏸ Timer reset. Click Start Day.";
                    // clear all tasks for new day
                    tasks = [];
                    nextId = 1;
                    editModeId = null;
                    renderTasks();
                    saveTasksToLocal();
                    saveTimerState();
                }
            } else {
                // just reset timer display without affecting tasks
                timeLeftSeconds = 24 * 3600;
                updateTimerDisplay();
                timerStatusSpan.innerText = "⏸ Timer reset (not started)";
                saveTimerState();
            }
        }

        function saveDaySnapshot() {
            if (tasks.length === 0) return;
            const snapshotTasks = tasks.map(t => ({ text: t.text, completed: t.completed }));
            const record = {
                startDate: currentDayStartTime ? new Date(currentDayStartTime).toLocaleString() : "manual start",
                endDate: new Date().toLocaleString(),
                dateLabel: new Date().toLocaleDateString(),
                tasks: snapshotTasks,
                total: snapshotTasks.length,
                completed: snapshotTasks.filter(t => t.completed).length
            };
            dayHistory.unshift(record); // newest first
            if (dayHistory.length > 50) dayHistory.pop();
            saveHistoryToLocal();
            renderHistoryModalContent();
        }

        // manual snapshot (in case user wants to finish early)
        function finishDayEarly() {
            if (!timerActive && timeLeftSeconds === 24 * 3600) {
                alert("Timer not started. Start a day first.");
                return;
            }
            if (timeLeftSeconds > 0 && timerActive) {
                if (confirm("Finish day early? Current tasks will be saved to history and timer will stop.")) {
                    stopTimer();
                    timerActive = false;
                    timerStatusSpan.innerText = "Day finished early.";
                    timeLeftSeconds = 0;
                    updateTimerDisplay();
                    if (tasks.length > 0) saveDaySnapshot();
                    // clear tasks
                    tasks = [];
                    nextId = 1;
                    renderTasks();
                    saveTasksToLocal();
                    timeLeftSeconds = 24 * 3600; // reset for next start
                    updateTimerDisplay();
                    timerStatusSpan.innerText = "⏸ Ready for new day. Click Start Day.";
                }
            } else {
                alert("No active timer.");
            }
        }

        // ----- Task management (similar to original) -----
        function renderTasks() {
            let filtered = tasks;
            if (currentFilter === "active") filtered = tasks.filter(t => !t.completed);
            if (currentFilter === "completed") filtered = tasks.filter(t => t.completed);
            taskListEl.innerHTML = "";
            if (filtered.length === 0) {
                const empty = document.createElement("li");
                empty.className = "empty-msg";
                empty.innerText = currentFilter === "all" ? "✨ No tasks. Add something for today!" : "No tasks in this category.";
                taskListEl.appendChild(empty);
            } else {
                filtered.forEach(task => {
                    const li = document.createElement("li");
                    li.className = "task-item";
                    const chk = document.createElement("input");
                    chk.type = "checkbox";
                    chk.className = "task-check";
                    chk.checked = task.completed;
                    chk.onchange = () => toggleComplete(task.id);
                    const span = document.createElement("span");
                    span.className = `task-text ${task.completed ? "completed" : ""}`;
                    span.innerText = task.text;
                    span.onclick = () => toggleComplete(task.id);
                    const actions = document.createElement("div");
                    const editBtn = document.createElement("button");
                    editBtn.innerHTML = "✏️";
                    editBtn.className = "icon-btn";
                    editBtn.onclick = (e) => { e.stopPropagation(); enableEdit(task.id); };
                    const delBtn = document.createElement("button");
                    delBtn.innerHTML = "🗑️";
                    delBtn.className = "icon-btn";
                    delBtn.onclick = (e) => { e.stopPropagation(); if (confirm("Delete?")) deleteTask(task.id); };
                    actions.appendChild(editBtn);
                    actions.appendChild(delBtn);
                    li.appendChild(chk);
                    li.appendChild(span);
                    li.appendChild(actions);
                    taskListEl.appendChild(li);
                });
            }
            updateStats();
            saveTasksToLocal();
            highlightFilter();
        }

        function toggleComplete(id) {
            const t = tasks.find(t => t.id === id);
            if (t) { t.completed = !t.completed; renderTasks(); }
        }
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            if (editModeId === id) resetEdit();
            renderTasks();
        }
        function enableEdit(id) {
            const t = tasks.find(t => t.id === id);
            if (!t) return;
            editModeId = id;
            taskInput.value = t.text;
            addBtn.innerText = "✏️ Update";
            cancelEditBtn.style.display = "inline-flex";
            taskInput.focus();
        }
        function resetEdit() {
            editModeId = null;
            taskInput.value = "";
            addBtn.innerText = "➕ Add Task";
            cancelEditBtn.style.display = "none";
        }
        function handleAddOrUpdate() {
            const text = taskInput.value.trim();
            if (!text) { alert("Write a task."); return; }
            if (editModeId !== null) {
                const index = tasks.findIndex(t => t.id === editModeId);
                if (index !== -1) tasks[index].text = text;
                resetEdit();
                renderTasks();
            } else {
                const newTask = { id: nextId++, text, completed: false };
                tasks.push(newTask);
                taskInput.value = "";
                renderTasks();
            }
        }
        function clearCompleted() {
            if (!tasks.some(t => t.completed)) { alert("No completed tasks."); return; }
            if (confirm("Remove completed tasks?")) {
                tasks = tasks.filter(t => !t.completed);
                if (editModeId && !tasks.find(t => t.id === editModeId)) resetEdit();
                renderTasks();
            }
        }
        function deleteAll() {
            if (tasks.length === 0) return;
            if (confirm("Delete ALL tasks? This cannot be undone.")) {
                tasks = [];
                resetEdit();
                renderTasks();
            }
        }
        function updateStats() {
            const total = tasks.length;
            const pending = tasks.filter(t => !t.completed).length;
            taskStatsSpan.innerText = `📊 ${total} task${total !== 1 ? 's' : ''} · ${pending} pending`;
        }
        function setFilter(f) {
            currentFilter = f;
            renderTasks();
        }
        function highlightFilter() {
            filterBtns.forEach(btn => {
                if (btn.dataset.filter === currentFilter) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }

        // save/load tasks
        function saveTasksToLocal() {
            localStorage.setItem("dailyTodo_tasks", JSON.stringify(tasks));
            localStorage.setItem("dailyTodo_nextId", nextId);
        }
        function loadTasks() {
            const saved = localStorage.getItem("dailyTodo_tasks");
            if (saved) tasks = JSON.parse(saved);
            const savedId = localStorage.getItem("dailyTodo_nextId");
            if (savedId) nextId = parseInt(savedId);
            else nextId = tasks.length ? Math.max(...tasks.map(t => t.id), 0) + 1 : 1;
        }

        // history storage
        function saveHistoryToLocal() {
            localStorage.setItem("dailyTodo_history", JSON.stringify(dayHistory));
        }
        function loadHistory() {
            const saved = localStorage.getItem("dailyTodo_history");
            if (saved) dayHistory = JSON.parse(saved);
            else dayHistory = [];
        }
        function renderHistoryModalContent() {
            historyListEl.innerHTML = "";
            if (dayHistory.length === 0) {
                historyListEl.innerHTML = '<li class="empty-msg">No completed days yet. Start a timer and finish a day.</li>';
                return;
            }
            dayHistory.forEach(day => {
                const li = document.createElement("li");
                li.className = "day-record";
                const totalTasks = day.tasks.length;
                const done = day.completed;
                li.innerHTML = `
                <div class="day-date">
                    <span>📅 ${day.dateLabel || day.startDate}</span>
                    <span>✅ ${day.completed}/${totalTasks}</span>
                </div>
                <div class="day-tasks">
                    ${day.tasks.map(t => `<span class="task-chip" style="text-decoration:${t.completed ? 'line-through' : 'none'}">${escapeHtml(t.text)}</span>`).join('')}
                </div>
            `;
                historyListEl.appendChild(li);
            });
        }
        function escapeHtml(s) {
            return s.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        function clearAllHistory() {
            if (confirm("Delete all daily history permanently?")) {
                dayHistory = [];
                saveHistoryToLocal();
                renderHistoryModalContent();
            }
        }

        // timer state persistence
        function saveTimerState() {
            localStorage.setItem("dailyTodo_timerActive", timerActive);
            localStorage.setItem("dailyTodo_timeLeft", timeLeftSeconds);
            if (currentDayStartTime) localStorage.setItem("dailyTodo_startTime", currentDayStartTime);
        }
        function loadTimerState() {
            const active = localStorage.getItem("dailyTodo_timerActive");
            const savedTime = localStorage.getItem("dailyTodo_timeLeft");
            const savedStart = localStorage.getItem("dailyTodo_startTime");
            if (savedTime !== null) timeLeftSeconds = parseInt(savedTime);
            else timeLeftSeconds = 24 * 3600;
            if (active === "true") {
                // restart timer only if time left > 0
                if (timeLeftSeconds > 0) {
                    timerActive = true;
                    if (savedStart) currentDayStartTime = parseInt(savedStart);
                    timerStatusSpan.innerText = "⏳ Day in progress...";
                    startTimer(); // this will set interval but avoid duplicate
                } else {
                    timerActive = false;
                    timerStatusSpan.innerText = "Day finished.";
                }
            } else {
                timerActive = false;
                timerStatusSpan.innerText = "⏸ Timer not started";
            }
            updateTimerDisplay();
        }
        function stopAndClearTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerActive = false;
            timerInterval = null;
        }

        // dark mode
        function initDark() {
            const saved = localStorage.getItem("dailyTodo_theme");
            if (saved === "dark") {
                document.body.classList.add("dark-mode");
                darkToggle.innerHTML = "☀️";
            } else {
                darkToggle.innerHTML = "🌙";
            }
        }
        function toggleDark() {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            localStorage.setItem("dailyTodo_theme", isDark ? "dark" : "light");
            darkToggle.innerHTML = isDark ? "☀️" : "🌙";
        }

        // event binding
        function bindEvents() {
            addBtn.onclick = handleAddOrUpdate;
            cancelEditBtn.onclick = resetEdit;
            clearCompletedBtn.onclick = clearCompleted;
            clearAllBtn.onclick = deleteAll;
            darkToggle.onclick = toggleDark;
            historyBtn.onclick = () => { renderHistoryModalContent(); historyModal.classList.add("active"); };
            closeModalBtn.onclick = () => historyModal.classList.remove("active");
            clearHistoryBtn.onclick = clearAllHistory;
            window.onclick = (e) => { if (e.target === historyModal) historyModal.classList.remove("active"); };
            startTimerBtn.onclick = startTimer;
            resetTimerBtn.onclick = resetDay;
            filterBtns.forEach(btn => {
                btn.onclick = () => setFilter(btn.dataset.filter);
            });
            taskInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleAddOrUpdate(); });
        }

        function init() {
            loadTasks();
            loadHistory();
            initDark();
            bindEvents();
            renderTasks();
            loadTimerState();
            // if timer active, start interval (it might have been restored)
            if (timerActive && timeLeftSeconds > 0) {
                // startTimer will set interval, but avoid duplicate intervals
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if (timerActive && timeLeftSeconds > 0) {
                        timeLeftSeconds--;
                        updateTimerDisplay();
                        saveTimerState();
                        if (timeLeftSeconds === 0) finishCurrentDay();
                    }
                }, 1000);
            }
            updateTimerDisplay();
        }
        init();
    </script>
</body>

</html>
